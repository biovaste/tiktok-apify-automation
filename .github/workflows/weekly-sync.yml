name: Weekly TikTok sync

on:
  schedule:
    # 15:00 UTC every Sunday = 18:00 Finnish time (EEST). Adjust as needed.
    - cron: "0 15 * * 0"
  workflow_dispatch:        # lets you run it manually from the Actions tab
    inputs:
      dry_run:
        description: "Scrape but write nothing"
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run sync
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ vars.SPREADSHEET_ID }}
          TIKTOK_USERNAME: ${{ vars.TIKTOK_USERNAME }}
        run: |
          python sync.py ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '--dry-run' || '' }}
