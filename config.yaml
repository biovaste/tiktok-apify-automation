# TikTok → Apify → Google Sheet automation config
# Edit values here, commit, push. No code changes needed for routine tweaks.

# Personal identifiers (Sheet ID + username) are intentionally left blank so this
# file can be committed to a PUBLIC repo. Set them via environment variables /
# GitHub repo Variables instead:  SPREADSHEET_ID  and  TIKTOK_USERNAME.
# (For a private repo or local-only use, you may just fill them in here.)
spreadsheet_id: ""
actor_id: "clockworks/tiktok-scraper"

# ─── Run A: my own posts ────────────────────────────────────────────────
profile:
  username: ""           # or set TIKTOK_USERNAME
  results_per_page: 30
  recent_days: 14        # only scrape posts from the last N days (keeps cost ~$0)

# ─── Run B: hashtag / trend scan ────────────────────────────────────────
hashtags:
  tags: ["cheertok", "cheerleading", "cheer", "coedcheer"]
  results_per_tag: 20

# ─── Sheet tab names (matched by substring, so emoji prefixes are fine) ──
sheets:
  post_log: "Post Log"
  weekly_log: "Weekly Log"     # weekly aggregate row (followers, totals, best post)
  trend_watch: "Trend Watch"   # created automatically if missing

# ─── Dropdown options applied to the Pillar / Hook Type columns of newly ──
# added Post Log rows, so you can tag them from a dropdown. Suggestions only
# (you can still type anything). Edit these lists freely.
tagging:
  pillar_options:
    - Unexpected Cheerleader
    - Story / Emotion
    - Cheer Craft
    - Nerd Side
    - Trending Format
    - Cooking / Personality
  hook_options:
    - Identity contrast
    - Age/milestone reveal
    - Challenge/attempt
    - Emotional story
    - Humor
    - Trending sound
    - Before/after
    - Question hook
